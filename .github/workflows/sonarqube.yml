name: SonarQube

concurrency:
  group: angular-chronicles-part-1-sonarqube
  cancel-in-progress: false

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test:coverage
        continue-on-error: true

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_ENABLE_PR_DECORATION: "false"
        run: |
          set -e

          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "::error::SONAR_TOKEN and SONAR_HOST_URL must be set as GitHub Secrets"
            exit 1
          fi

          echo "Testing SonarQube connectivity..."
          curl -f -s "$SONAR_HOST_URL/api/system/status" >/dev/null || {
            echo "::error::Failed to connect to SonarQube at $SONAR_HOST_URL"
            exit 1
          }

          echo "Running SonarQube scan..."

          docker run --rm \
            -v "$PWD:/usr/src" \
            -w /usr/src \
            -e SONAR_TOKEN="$SONAR_TOKEN" \
            -e SONAR_HOST_URL="$SONAR_HOST_URL" \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.host.url="$SONAR_HOST_URL"

          echo "SONAR_DASHBOARD_URL=$SONAR_HOST_URL/dashboard?id=angular-chronicles-part-1" >> $GITHUB_ENV

      - name: Comment PR with SonarQube Dashboard Link
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- sonarqube-analysis -->
            ## 📊 SonarQube Analysis

            **🔗 [Abrir dashboard](${{ env.SONAR_DASHBOARD_URL }})**

            **Projeto:** `angular-chronicles-part-1`
            **Branch:** `${{ github.head_ref }}`
            **Commit:** `${{ github.sha }}`

            ---
            _Executado via GitHub Actions_
