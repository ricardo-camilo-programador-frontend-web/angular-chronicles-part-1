# ============================================================================
# PROJECT KEY - Identificador único do projeto no SonarQube
# ============================================================================
#
# IMPORTANTE: O projectKey é OBRIGATÓRIO e deve ser único no servidor SonarQube
#
# Para SonarCloud:
#   - Formato: organization_projectKey (ex: ricardocamiloconsir_angular-chronicles-part-1)
#   - O projeto é criado automaticamente na primeira análise
#
# Para SonarQube Self-Hosted:
#   - Você pode usar qualquer formato (ex: angular-chronicles-part-1)
#   - O projeto DEVE ser criado ANTES no servidor SonarQube:
#     1. Acesse: http://localhost:9000
#     2. Vá em: Projects > Create Project > Manually
#     3. Defina o Project Key (deve ser EXATAMENTE igual ao valor abaixo)
#     4. Defina o Display Name (pode ser diferente)
#
# Onde encontrar o projectKey no SonarQube:
#   - Na página do projeto: http://localhost:9000/dashboard?id=angular-chronicles-part-1
#   - No menu: Projects > [Seu Projeto] > Project Information > Key
# ============================================================================
sonar.projectKey=angular-chronicles-part-1
sonar.projectName=Angular Chronicles Part 1
sonar.projectVersion=0.0.0

# ============================================================================
# FONTE DE CÓDIGO
# ============================================================================
# Diretório raiz dos arquivos fonte
sonar.sources=src

# ============================================================================
# EXCLUSÕES DE ARQUIVOS
# ============================================================================
# Arquivos e diretórios a serem excluídos da análise
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.spec.js,**/*.d.ts,**/*.pb.go,**/*.pb.json,*.tsbuildinfo,**/generated/**,**/testing/**,**/e2e/**
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.spec.js,**/*.d.ts

# ============================================================================
# CONFIGURAÇÃO DE TESTES
# ============================================================================
# Diretório onde os arquivos de teste estão localizados
sonar.tests=src

# Padrões para incluir arquivos de teste
sonar.test.inclusions=**/*.spec.ts,**/*.spec.js

# ============================================================================
# COBERTURA DE TESTES (LCOV)
# ============================================================================
# Caminho para o relatório de cobertura no formato LCOV
# Nota: Para Angular com Karma, o relatório é gerado em coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ============================================================================
# CONFIGURAÇÕES ESPECÍFICAS PARA ANGULAR
# ============================================================================
# Codificação de caracteres
sonar.sourceEncoding=UTF-8

# Arquivos TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Configurações do Angular (exclui arquivos gerados e templates)
sonar.exclusions+=**/*.component.html,**/*.component.scss

# ============================================================================
# TOKENS DE AUTENTICAÇÃO
# ============================================================================
# Estes valores são configurados via environment variables para segurança
# Não modifique estes valores diretamente - use variáveis de ambiente
#
# Para uso local:
#   export SONAR_TOKEN="seu_token_aqui"
#   export SONAR_HOST_URL="http://localhost:9000"
#   pnpm sonar
#
# Para CI/CD (GitHub Actions):
#   Configurar secrets: SONAR_TOKEN e SONAR_HOST_URL
# ============================================================================
# sonar.token is set via environment variable SONAR_TOKEN
# sonar.host.url is set via environment variable SONAR_HOST_URL

# ============================================================================
# CONFIGURAÇÃO DE BRANCHES (requer Developer Edition ou superior)
# ============================================================================
# Descomente e configure se tiver edição Developer do SonarQube
# ============================================================================
# sonar.branch.name=${BRANCH_NAME}
# sonar.pullrequest.key=${PULL_REQUEST_ID}
# sonar.pullrequest.branch=${PULL_REQUEST_BRANCH}
# sonar.pullrequest.base=${PULL_REQUEST_BASE}

# ============================================================================
# QUALITY GATES E MÉTRICAS
# ============================================================================
# Configure no servidor SonarQube (Quality Gates > Create):
# - Coverage on New Code: ≥ 80% (ajuste conforme maturidade do projeto)
# - Duplicated Lines: ≤ 3%
# - Maintainability Rating: A ou B
# - Reliability Rating: A ou B
# - Security Rating: A
# ============================================================================

# ============================================================================
# EXCLUSÕES DE REGRAS ESPECÍFICAS (opcional)
# ============================================================================
# Descomente e configure se precisar ignorar regras específicas
# ============================================================================
# sonar.issue.ignore.multicriteria=e1
# sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1134
# sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.spec.ts
